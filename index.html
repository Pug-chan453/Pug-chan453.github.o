<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>NovaNet</title>

<link rel="icon" href="OIP.webp">

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#181818;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

header img{
width:35px;
height:35px;
border-radius:50%;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.postbox{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

textarea{
width:100%;
background:#111;
border:none;
color:white;
padding:10px;
border-radius:5px;
}

button{
margin-top:10px;
padding:10px;
background:#7a5cff;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.post{
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:10px;
}
</style>

</head>

<body>

<header>
<img src="OIP.webp">
<h2>NovaNet</h2>
</header>

<div class="container">

<div class="postbox">
<h3>Criar Post</h3>
<textarea placeholder="O que você está pensando?"></textarea>
<br>
<button>Postar</button>
</div>

<div class="post">
<b>Admin</b>
<p>Bem-vindo ao NovaNet 🚀</p>
</div>

</div>

</body>
</html>
