<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaNet</title>

<link rel="icon" href="OIP.webp">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1 class="logo">
<img src="OIP.webp">
NovaNet
</h1>

<div class="login">

<input id="usernameInput" placeholder="Seu nome">
<button onclick="setUser()">Entrar</button>

</div>

</header>


<div class="container">

<!-- PERFIL -->

<div class="card profile">

<img id="avatar" src="OIP.webp">

<h3 id="profileName">Visitante</h3>

<div class="stats">

<div>
<strong id="postCount">0</strong>
<p>Posts</p>
</div>

</div>

</div>


<!-- FEED -->

<div class="card">

<h2>Criar Post</h2>

<textarea id="postText" placeholder="O que você está pensando?"></textarea>

<input id="postImage" placeholder="URL da imagem">

<button onclick="createPost()">Postar</button>

<div id="feed"></div>

</div>


<!-- CHAT -->

<div class="card">

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Mensagem">

<button onclick="sendMessage()">Enviar</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
